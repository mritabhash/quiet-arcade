name: Deploy Quiet Arcade

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build website
        # These are public, client-side values (they ship in the JS bundle by
        # design): the Supabase publishable key and PostHog project token.
        # The service_role key must NEVER appear here.
        env:
          VITE_SUPABASE_URL: https://ojiuxxopfnhrqhwhuwar.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_sW2MTLqoW19Hf-YAwOHQ5g__dtA94xP
          VITE_POSTHOG_KEY: phc_yu48HSBHHidkhdrkW6K4yJcZn6XEFYciyZLgNB3syuhN
          VITE_POSTHOG_HOST: https://us.i.posthog.com
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
